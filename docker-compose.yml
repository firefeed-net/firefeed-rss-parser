services:
  # FireFeed RSS Parser Service
  firefeed-rss-parser:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: firefeed-rss-parser
    restart: unless-stopped
    environment:
      - FIREFEED_API_BASE_URL=http://host.docker.internal:8001
      - FIREFEED_API_RSS_PARSER_TOKEN=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzZXJ2aWNlX2lkIjoicnNzLXBhcnNlciIsInNlcnZpY2VfbmFtZSI6IkZpcmVGZWVkIFJTUyBQYXJzZXIiLCJzY29wZXMiOlsiaW50ZXJuYWw6cmVhZCIsImludGVybmFsOndyaXRlIl0sImV4cCI6MTc2NjgyNTg4NiwiaWF0IjoxNzY2ODIyMjg2LCJ0eXBlIjoic2VydmljZSJ9.xY5v1WqwCwv3UnVPYD7GzwXey4j17C57U0fzdFO22O4
      - FIREFEED_SERVICE_ID=rss-parser
      - LOG_LEVEL=INFO
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./data/media:/app/media

    ports:
      - "8080:8080"  # Metrics
      - "8081:8081"  # Health checks
    depends_on:
      - firefeed-api
      - redis
    networks:
      - firefeed-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # FireFeed API Service
  firefeed-api:
    build:
      context: ../firefeed-api
      dockerfile: Dockerfile
    container_name: firefeed-api
    restart: unless-stopped
    environment:
      - SERVICE_ID=firefeed-api
      - SERVICE_NAME=firefeed-api
      - SERVICE_VERSION=1.0.0
      - API_BASE_URL=http://firefeed-api:8000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-super-secret-jwt-key}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRATION_MINUTES=30
      - FIREFEED_API_RSS_PARSER_TOKEN=your-rss-parser-token-here
      - FIREFEED_API_TELEGRAM_BOT_TOKEN=your-telegram-bot-token-here
      - RATE_LIMIT_REQUESTS=100
      - RATE_LIMIT_WINDOW=60
      - TRANSLATION_ENABLED=true
      - TRANSLATION_MODEL=facebook/m2m100_418M
      - TRANSLATION_MAX_CONCURRENT=3
      - DUPLICATE_DETECTION_ENABLED=true
      - DUPLICATE_DETECTOR_MODEL=paraphrase-multilingual-MiniLM-L12-v2
      - CACHE_ENABLED=true
      - CACHE_TTL=3600
      - CACHE_MAX_SIZE=10000
    volumes:
      - ../firefeed-api/logs:/app/logs
      - ../firefeed-api/data:/app/data
    ports:
      - "8002:8000"
    depends_on:
      - postgres
      - redis
    networks:
      - firefeed-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # FireFeed Telegram Bot Service
  firefeed-telegram-bot:
    build:
      context: ../firefeed-telegram-bot
      dockerfile: Dockerfile
    container_name: firefeed-telegram-bot
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_BOT_NAME=${TELEGRAM_BOT_NAME:-FireFeedBot}
      - TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME}
      - TELEGRAM_BOT_ID=${TELEGRAM_BOT_ID}
      - TELEGRAM_BOT_FIRST_NAME=${TELEGRAM_BOT_FIRST_NAME}
      - TELEGRAM_BOT_LAST_NAME=${TELEGRAM_BOT_LAST_NAME}
      - TELEGRAM_BOT_LANGUAGE_CODE=${TELEGRAM_BOT_LANGUAGE_CODE:-en}
      - TELEGRAM_WEBHOOK_URL=${TELEGRAM_WEBHOOK_URL:-https://your-domain.com/webhook}
      - TELEGRAM_WEBHOOK_SECRET_TOKEN=${TELEGRAM_WEBHOOK_SECRET_TOKEN}
      - TELEGRAM_MAX_MESSAGE_LENGTH=4096
      - TELEGRAM_RATE_LIMIT_REQUESTS=30
      - TELEGRAM_RATE_LIMIT_WINDOW=60
      - TELEGRAM_ENABLE_WEBHOOK=true
      - TELEGRAM_POLLING_TIMEOUT=20
      - FIREFEED_API_BASE_URL=http://host.docker.internal:8001
      - FIREFEED_API_TELEGRAM_BOT_TOKEN=${FIREFEED_API_TELEGRAM_BOT_TOKEN:-your-telegram-bot-token-here}
      - LOG_LEVEL=INFO
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=1
    volumes:
      - ../firefeed-telegram-bot/logs:/app/logs
      - ../firefeed-telegram-bot/data:/app/data
    ports:
      - "8001:8001"  # Bot API port
    depends_on:
      - firefeed-api
      - redis
    networks:
      - firefeed-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: firefeed-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=firefeed
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    networks:
      - firefeed-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d firefeed"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: firefeed-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    networks:
      - firefeed-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  firefeed-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16